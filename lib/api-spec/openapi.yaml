openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feedback
    description: Feedback operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit playtester feedback
      description: Save feedback from a game playtester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Feedback saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List playtester feedback
      description: Retrieve all submitted feedback entries
      responses:
        "200":
          description: List of feedback entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackEntry"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    FeedbackInput:
      type: object
      properties:
        playerName:
          type: string
          nullable: true
        playerClass:
          type: string
          nullable: true
        rating:
          type: string
          enum: [terrible, bad, okay, good, amazing]
        message:
          type: string
          minLength: 1
      required:
        - rating
        - message
    FeedbackResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message
    FeedbackEntry:
      type: object
      properties:
        id:
          type: integer
        playerName:
          type: string
          nullable: true
        playerClass:
          type: string
          nullable: true
        rating:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - rating
        - message
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
