openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feedback
    description: Playtest feedback operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit playtest feedback
      description: Saves a feedback submission from a playtester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Feedback saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getFeedback
      tags: [feedback]
      summary: Retrieve all feedback submissions
      description: Returns all submitted feedback for review
      responses:
        "200":
          description: List of feedback submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackItem"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    FeedbackInput:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Star rating from 1 to 5
        chapter:
          type: integer
          nullable: true
          description: Chapter number the tester is on
        scene:
          type: string
          nullable: true
          description: Current scene identifier
        comment:
          type: string
          nullable: true
          description: Free-text comment from the tester
      required:
        - rating
    FeedbackItem:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        chapter:
          type: integer
          nullable: true
        scene:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - rating
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
