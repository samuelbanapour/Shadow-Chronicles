kind = "web"
previewPath = "/"
title = "Dark Sovereign RPG"
version = "1.0.0"
id = "artifacts/evil-rpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24071

[services.development]
run = "pnpm --filter @workspace/evil-rpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/evil-rpg", "run", "build" ]
publicDir = "artifacts/evil-rpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24071"
BASE_PATH = "/"
